; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:sparkfun_esp32s2_thing_plus_c]
platform = espressif32
board = sparkfun_esp32s2_thing_plus_c
framework = arduino
monitor_speed = 115200
lib_deps =
  https://github.com/greiman/SdFat
  https://github.com/sparkfun/SparkFun_WM8960_Arduino_Library
  https://github.com/sparkfun/SparkFun_MAX1704x_Fuel_Gauge_Arduino_Library
build_unflags = -std=gnu++11 ; Remove the default C++11 standard
; General speedup of floating point operations that are mostly safe
; The least safe options are reciprocal-math and associative-math, but shouldn't be too problematic
build_flags = -std=gnu++14 -ffp-contract=fast -fno-math-errno -fno-signaling-nans -fno-trapping-math -fno-signed-zeros -fcx-limited-range -fassociative-math -freciprocal-math
